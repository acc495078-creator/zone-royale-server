<!DOCTYPE html>
<html>
<head>
  <title>Multiplayer Game</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      color: white;
      font-family: Arial;
    }

    #ui {
      position: absolute;
      z-index: 10;
      padding: 10px;
      background: rgba(0,0,0,0.5);
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>

<div id="ui">
  <h3>Enter Name</h3>
  <input id="nameInput">
  <button onclick="setName()">Join</button>

  <h3>Chat</h3>
  <input id="chatInput" placeholder="message...">
  <button onclick="sendChat()">Send</button>
  <div id="chatBox"></div>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: 100, y: 100 };
let players = {};

function setName() {
  const name = document.getElementById("nameInput").value;
  socket.emit("setName", name);
}

function sendChat() {
  const msg = document.getElementById("chatInput").value;
  socket.emit("sendChat", msg);
}

socket.on("chat", (data) => {
  const box = document.getElementById("chatBox");
  box.innerHTML += `<div><b>${data.name}:</b> ${data.msg}</div>`;
});

socket.on("players", (serverPlayers) => {
  players = serverPlayers;
});

document.addEventListener("keydown", (e) => {
  if (e.key === "w") player.y -= 5;
  if (e.key === "s") player.y += 5;
  if (e.key === "a") player.x -= 5;
  if (e.key === "d") player.x += 5;

  socket.emit("move", player);
});

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let id in players) {
    let p = players[id];

    ctx.fillStyle = "lime";
    ctx.fillRect(p.x, p.y, 20, 20);

    ctx.fillStyle = "white";
    ctx.fillText(p.name, p.x, p.y - 5);
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
